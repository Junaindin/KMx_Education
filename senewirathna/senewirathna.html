<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Author Profile & Book Store - KMx Education</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Noto+Sans+Sinhala:wght@300;400;500;600;700&display=swap">
   
    <style>
        /* --- CSS VARIABLES (LIGHT/DARK THEME) --- */
        :root {
            --bg-base: #fdfbf7;
            --bg-surface: #ffffff;
            --bg-widget: #f9f6f0;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --primary: #800020; /* KMx Maroon */
            --primary-hover: #5d0017;
            --border-color: #e2e8f0;
            --input-bg: #ffffff;
            --nav-bg: #ffffff;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            --font-family: 'Poppins', 'Noto Sans Sinhala', sans-serif;
            --radius: 16px;
            --transition: all 0.3s ease;
            --title-color: #800020;
            --card-border: 1px dashed #c4a4a4;
           
            --toggle-bg: #ffffff;
            --toggle-text: #800020;
            --toggle-border: #800020;
        }

        [data-theme="dark"] {
            --bg-base: #0f172a;
            --bg-surface: #1e293b;
            --bg-widget: #0f172a;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --primary: #800020;
            --primary-hover: #a10d32;
            --border-color: #334155;
            --input-bg: #0f172a;
            --nav-bg: #1e293b;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            --title-color: #f59e0b;
            --card-border: 1px dashed #475569;
           
            --toggle-bg: #800020;
            --toggle-text: #ffffff;
            --toggle-border: #800020;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: var(--font-family);
            line-height: 1.6;
            transition: var(--transition);
        }

        /* --- HEADER & NAVIGATION --- */
        header {
            background-color: var(--nav-bg);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 3px solid var(--primary);
            transition: var(--transition);
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-main);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo span {
            color: var(--primary);
        }

        nav {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        nav a {
            text-decoration: none;
            color: var(--text-main);
            font-weight: 500;
            font-size: 16px;
            transition: var(--transition);
            padding: 6px 14px;
            border-radius: 8px;
        }

        nav a:hover, nav a.active {
            background-color: var(--primary);
            color: white;
        }

        .theme-toggle {
            background-color: var(--toggle-bg);
            border: 2px solid var(--toggle-border);
            color: var(--toggle-text);
            padding: 6px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
        }

        /* --- AUTHOR PROFILE SECTION --- */
        .profile-container {
            max-width: 800px;
            margin: 40px auto 20px auto;
            text-align: center;
            padding: 0 20px;
        }

        .author-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--primary);
            box-shadow: var(--shadow);
            margin-bottom: 10px;
        }

        .author-badge {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 600;
            display: block;
            margin-bottom: 5px;
        }

        .author-name {
            font-size: 32px;
            color: var(--title-color);
            font-weight: 700;
            margin-bottom: 10px;
        }

        .author-bio {
            font-size: 15px;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto 25px auto;
        }

        /* --- SEARCH BAR --- */
        .search-wrapper {
            max-width: 500px;
            margin: 0 auto 40px auto;
            position: relative;
        }

        .search-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-input {
            width: 100%;
            padding: 14px 16px 14px 45px;
            border: 1px solid var(--border-color);
            border-radius: 30px;
            background-color: var(--bg-surface);
            color: var(--text-main);
            font-family: var(--font-family);
            font-size: 15px;
            box-shadow: var(--shadow);
            outline: none;
            transition: var(--transition);
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(128, 0, 32, 0.1);
        }

        /* --- MAIN CONTENT & SHOWCASE --- */
        .store-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 30px 20px;
            background-color: var(--bg-surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }

        .store-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .store-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* --- CATEGORIES --- */
        .category-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .cat-btn {
            background-color: var(--bg-widget);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .cat-btn:hover {
            background-color: var(--border-color);
        }

        .cat-btn.active {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* --- BOOK GRID --- */
        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 30px;
        }

        .book-card {
            background-color: var(--bg-surface);
            border: var(--card-border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: var(--transition);
        }

        .book-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow);
        }

        .book-tag {
            position: absolute;
            top: 15px;
            left: 15px;
            background-color: var(--primary);
            color: white;
            font-size: 10px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            z-index: 2;
        }

        .book-img-box {
            width: 100%;
            height: 240px;
            background-color: #f2ede4;
            border-radius: 8px;
            margin-bottom: 15px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8c7e6c;
            font-size: 14px;
            font-weight: 500;
        }

        .book-img-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 6px;
            border-radius: 8px;
        }

        .book-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 50px;
        }

        .book-author {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .book-price {
            font-size: 16px;
            font-weight: 700;
            color: #b02a2a;
            margin-bottom: 15px;
        }

        .buy-btn {
            width: 100%;
            background-color: var(--bg-surface);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            display: inline-block;
        }

        .buy-btn:hover {
            background-color: var(--primary);
            color: white;
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 16px;
        }

        /* --- FOOTER --- */
        footer {
            text-align: center;
            padding: 25px;
            margin-top: 60px;
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 13px;
            background-color: var(--nav-bg);
        }

        /* --- RESPONSIVE BREAKPOINTS --- */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 15px;
            }
            .store-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .category-container {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <!-- HEADER / MENU BAR -->
    <header>
        <a href="#" class="logo"><i class="fas fa-graduation-cap"></i> KMx <span>Education</span></a>
        <nav>
            <a href="#" class="active">K.M Senewirathna Store</a>
            
            <button class="theme-toggle" id="themeBtn">
                <i class="fas fa-moon"></i> <span id="toggleText">Dark Mode</span>
            </button>
        </nav>
    </header>

    <!-- AUTHOR PROFILE SECTION -->
    <div class="profile-container">
        <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?auto=format&fit=crop&q=80&w=250" alt="Author" class="author-img">
        <span class="author-badge"><i class="fas fa-circle-check" style="color: #22c55e;"></i> Verified Author</span>
        <h1 class="author-name">කේ. එම්. සෙනෙවිරත්න</h1>
        <p class="author-bio">ශ්‍රී ලාංකීය පාඨක මනස පිනවන නවකතා, කෙටිකතා මෙන්ම නවීන ග්‍රන්ථ කර්තෘවරයෙකි.</p>
    </div>

    <!-- LIVE SEARCH BAR -->
    <div class="search-wrapper">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" class="search-input" placeholder="ඔබට අවශ්‍ය පොතේ නම මෙතනින් සොයන්න...">
    </div>

    <!-- MAIN SHOWCASE CONTAINER -->
    <div class="store-container">
        <div class="store-header">
            <div class="store-title">📚 අලුතින්ම එක්වූ පොත්</div>
           
            <!-- CATEGORIES FILTER -->
            <div class="category-container">
                <button class="cat-btn active" data-filter="all">All</button>
                <button class="cat-btn" data-filter="Novels">Novels</button>
                <button class="cat-btn" data-filter="ICT">ICT Books</button>
                <button class="cat-btn" data-filter="Short Stories">Short Stories</button>
                <button class="cat-btn" data-filter="Grammar">Grammar</button>
                <button class="cat-btn" data-filter="Others">Others</button>
            </div>
        </div>

        <!-- BOOK CARDS GRID -->
        <div class="books-grid" id="booksGrid">
            







            <!-- Book 2 -->
            <div class="book-card" data-category="Novels" data-title="සාගරයක ආදරය ">
                <span class="book-tag" style="background-color: #800020;">Novel</span>
                <div class="book-img-box">
                    <img src="sagaraya.png" alt="සාගරයක ආදරය">
                </div>
                <div>
                    <div class="book-title">සාගරයක ආදරය</div>
                    <div class="book-author">කේ. එම්. සෙනෙවිරත්න</div>
                    <div class="book-price">Rs. 1,090.00</div>
                </div>
                <button class="buy-btn" onclick="navigateToBuy('සාගරයක ආදරය', '1090.00')">Buy Now</button>
            </div>

            







            
        </div>
    </div>

    <footer>
        <p>&copy; 2026 KMx Education. All Rights Reserved. Smart Book Store System.</p>
    </footer>

    <script>
        // --- 1. DYNAMIC THEME TOGGLE ENGINE ---
        const themeBtn = document.getElementById('themeBtn');
        const themeIcon = themeBtn.querySelector('i');
        const toggleText = document.getElementById('toggleText');

        themeBtn.addEventListener('click', () => {
            let currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                themeIcon.classList.replace('fa-sun', 'fa-moon');
                toggleText.textContent = "Dark Mode";
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeIcon.classList.replace('fa-moon', 'fa-sun');
                toggleText.textContent = "Light Mode";
            }
        });

        // --- 2. LIVE SEARCH & CATEGORY FILTER LOGIC ---
        const searchInput = document.getElementById('searchInput');
        const catButtons = document.querySelectorAll('.cat-btn');
        const bookCards = document.querySelectorAll('.book-card');
        const booksGrid = document.getElementById('booksGrid');

        function filterBooks() {
            const searchText = searchInput.value.toLowerCase().trim();
            const activeCategory = document.querySelector('.cat-btn.active').getAttribute('data-filter');
            let visibleCount = 0;

            bookCards.forEach(card => {
                const cardCategory = card.getAttribute('data-category');
                const cardTitle = card.getAttribute('data-title').toLowerCase();
               
                const matchesSearch = cardTitle.includes(searchText);
                const matchesCategory = (activeCategory === 'all' || cardCategory === activeCategory);

                if (matchesSearch && matchesCategory) {
                    card.style.display = 'flex';
                    visibleCount++;
                } else {
                    card.style.display = 'none';
                }
            });

            // Handle No Results Message
            const existingNoRes = document.querySelector('.no-results');
            if (visibleCount === 0) {
                if (!existingNoRes) {
                    const noResDiv = document.createElement('div');
                    noResDiv.classList.add('no-results');
                    noResDiv.innerHTML = `<i class="fas fa-folder-open" style="display:block; font-size:30px; margin-bottom:10px;"></i> ඔබ සෙවූ පොත හමු වූයේ නැත.`;
                    booksGrid.appendChild(noResDiv);
                }
            } else if (existingNoRes) {
                existingNoRes.remove();
            }
        }

        // Search Input Event
        searchInput.addEventListener('input', filterBooks);

        // Category Buttons Event
        catButtons.forEach(button => {
            button.addEventListener('click', () => {
                catButtons.forEach(btn => btn.classList.remove('active'));
                button.classList.add('active');
                filterBooks();
            });
        });

        // --- 3. DYNAMIC NAVIGATION TO KASUNEMAILBOOK.HTML ---
        function navigateToBuy(bookName, price) {
            // User ව කෙලින්ම emailbook.html පිටුවට රැගෙන යාම
            const targetUrl = `senewirathnaemail.html?book=${encodeURIComponent(bookName)}&price=${encodeURIComponent(price)}`;
            window.location.href = targetUrl;
        }
    </script>
</body>
</html>
